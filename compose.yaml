name: clickme

services:
  clickme-app:
    image: clickme-app:${CLICKME_RELEASE:-local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - ${KAIST_APP_ENV_FILE:-/srv/clickme/shared/clickme.env}
    environment:
      # Nginx owns 127.0.0.1:3000 on the host. The container is reachable only
      # through the loopback mapping below.
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3001:3001"
    mem_reservation: 768m
    mem_limit: 1g
    pids_limit: 128
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,mode=0755,uid=1001,gid=1001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/ready').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
