openapi: 3.1.0
info:
  title: WISH MATCH API
  version: 1.0.0
  description: |
    NCT WISH 프리퀀시 공동구매 매칭 API입니다. 인증은 Kakao OAuth만 지원하며
    이메일 signup/login/password-reset API는 제공하지 않습니다.
servers:
  - url: https://wishmatch.madcamp-kaist.org
  - url: http://localhost:4000
tags:
  - name: Auth
  - name: Users
  - name: Stores
  - name: Events
  - name: Posts
  - name: Reviews
  - name: Favorites
  - name: Participations
  - name: PurchaseRequests
  - name: Inquiries
  - name: Notifications
  - name: Reports
  - name: Admin
  - name: Health
paths:
  /api/v1/inquiries:
    get:
      tags: [Inquiries]
      summary: 내 문의 목록
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
    post:
      tags: [Inquiries]
      summary: 문의 접수
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InquiryCreate" }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /api/v1/health:
    get:
      tags: [Health]
      summary: 프로세스 및 DB 상태 확인
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "503": { $ref: "#/components/responses/Error" }
  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: 내 알림 목록 및 읽지 않은 알림 수
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { name: unreadOnly, in: query, schema: { type: boolean, default: false } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: 내 모든 알림 읽음 처리
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: 내 알림 한 건 읽음 처리
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/auth/kakao/start:
    get:
      tags: [Auth]
      summary: Kakao 로그인 시작
      description: OAuth state signed HttpOnly cookie를 설정하고 Kakao 인가 페이지로 리다이렉트합니다.
      responses:
        "302": { description: Kakao authorize redirect }
  /api/v1/auth/kakao/callback:
    get:
      tags: [Auth]
      summary: Kakao OAuth callback
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
        - { name: error_description, in: query, schema: { type: string } }
      responses:
        "302": { description: 고정된 성공 또는 실패 프론트엔드 URL로 redirect }
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh Token 회전
      security: [{ refreshCookie: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Error" }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 자체 세션 로그아웃
      responses:
        "204": { description: 로그아웃 완료 }
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 내 공개 정보
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Error" }
  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: 공개 프로필
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/users/me:
    patch:
      tags: [Users]
      summary: 내 닉네임 수정
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [nickname]
              properties: { nickname: { type: string, minLength: 2, maxLength: 20 } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/users/me/profile-image:
    put:
      tags: [Users]
      summary: 내 프로필 이미지 등록 또는 교체
      description: 브라우저에서 정사각형으로 축소한 JPEG, PNG 또는 WebP data URL을 저장합니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [imageData]
              properties:
                imageData:
                  type: string
                  maxLength: 95000
                  pattern: "^data:image/(?:jpeg|png|webp);base64,[A-Za-z0-9+/=]+$"
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Users]
      summary: 내 프로필 이미지를 기본 이미지로 변경
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v1/users/{id}/posts:
    get:
      tags: [Users]
      summary: 사용자 작성글
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/users/me/posts:
    get:
      tags: [Users]
      summary: 내가 작성한 모집글 (오픈채팅 URL 포함)
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/users/{id}/reviews:
    get:
      tags: [Users]
      summary: 사용자가 받은 후기
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/stores:
    get:
      tags: [Stores]
      summary: 매장 검색
      parameters:
        - { name: region, in: query, schema: { type: string } }
        - { name: keyword, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/stores/regions:
    get:
      tags: [Stores]
      summary: 활성 공식 매장의 지역별 개수
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/stores/{id}:
    get:
      tags: [Stores]
      summary: 매장 상세
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/stores/{id}/menus:
    get:
      tags: [Stores]
      summary: 매장에서 주문 가능한 NCT WISH 이벤트 메뉴
      description: NCT WISH 프리퀀시 대상 10종 중 해당 매장에서 판매 중인 메뉴만 반환하며 판매 가능 여부 상태값은 응답에 노출하지 않습니다.
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: category, in: query, schema: { $ref: "#/components/schemas/MenuCategory" } }
        - { name: keyword, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 300, default: 300 }
          }
      responses:
        "200": { $ref: "#/components/responses/MenuList" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/events:
    get:
      tags: [Events]
      summary: 이벤트 목록
      parameters:
        - { name: active, in: query, schema: { type: boolean } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/events/{id}:
    get:
      tags: [Events]
      summary: 이벤트 상세
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/posts:
    get:
      tags: [Posts]
      summary: 모집글 검색
      description: 목록 응답에는 openChatUrl이 포함되지 않습니다.
      parameters:
        - { name: region, in: query, schema: { type: string } }
        - { name: storeId, in: query, schema: { type: string } }
        - { name: storeName, in: query, schema: { type: string } }
        - { name: minDiscount, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: maxDiscount, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: minRemainCount, in: query, schema: { type: integer, minimum: 0 } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/PostStatus" } }
        - { name: eventId, in: query, schema: { type: string } }
        - { name: meetingFrom, in: query, schema: { type: string, format: date-time } }
        - { name: meetingTo, in: query, schema: { type: string, format: date-time } }
        - {
            name: sort,
            in: query,
            schema:
              {
                type: string,
                enum: [latest, meetingSoon, discountHigh, remainLow],
                default: latest
              }
          }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
    post:
      tags: [Posts]
      summary: 모집글 생성
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody: { $ref: "#/components/requestBodies/PostCreate" }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/Error" }
  /api/v1/posts/{id}:
    get:
      tags: [Posts]
      summary: 모집글 상세
      description: openChatUrl 노출은 인증 여부, 마감/삭제 상태 및 작성자/관리자 권한에 따라 달라집니다.
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [Posts]
      summary: 모집글 수정
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/PostUpdate" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Posts]
      summary: 모집글 soft delete
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "204": { description: 삭제 완료 } }
  /api/v1/posts/{id}/close:
    patch:
      tags: [Posts]
      summary: 모집글 마감 (멱등)
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/posts/{id}/remain-count:
    patch:
      tags: [Posts]
      summary: 남은 수량 변경
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [remainCount]
              properties: { remainCount: { type: integer, minimum: 0, maximum: 100 } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/reviews:
    post:
      tags: [Reviews]
      summary: 후기 작성
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewCreate" }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/reviews/users/{userId}:
    get:
      tags: [Reviews]
      summary: 사용자가 받은 후기
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/reviews/me:
    get:
      tags: [Reviews]
      summary: 내가 작성한 후기
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/posts/{postId}/favorite:
    post:
      tags: [Favorites]
      summary: 즐겨찾기 추가 (멱등)
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/PostId" }]
      responses: { "201": { $ref: "#/components/responses/Success" } }
    delete:
      tags: [Favorites]
      summary: 즐겨찾기 삭제 (멱등)
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/PostId" }]
      responses: { "204": { description: 삭제 완료 } }
  /api/v1/favorites:
    get:
      tags: [Favorites]
      summary: 내 즐겨찾기
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/posts/{postId}/participations:
    post:
      tags: [Participations]
      summary: 모집 참여 및 남은 수량 예약
      description: 사용자당 모집글 하나에 한 번만 참여할 수 있으며 수량 차감과 참여 저장은 원자적으로 처리됩니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/PostId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParticipationCreate" }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/participations/me:
    get:
      tags: [Participations]
      summary: 내 참여 목록
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/participations/{id}:
    delete:
      tags: [Participations]
      summary: 참여 취소 및 수량 복원
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/purchase-requests:
    get:
      tags: [PurchaseRequests]
      summary: 구매 요청 목록
      description: 목록에서는 오픈채팅 URL을 노출하지 않습니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [OPEN, ACCEPTED, CANCELLED] } }
        - { name: city, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
    post:
      tags: [PurchaseRequests]
      summary: 구매 요청 작성
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PurchaseRequestCreate" }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /api/v1/purchase-requests/{id}:
    get:
      tags: [PurchaseRequests]
      summary: 구매 요청 상세
      description: 오픈채팅 URL은 요청자 또는 수락자에게만 노출됩니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
    patch:
      tags: [PurchaseRequests]
      summary: 대기 중인 내 구매 요청 수정
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PurchaseRequestUpdate" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
    delete:
      tags: [PurchaseRequests]
      summary: 구매 요청 취소
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/purchase-requests/{id}/accept:
    post:
      tags: [PurchaseRequests]
      summary: 구매 요청 수락
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/reports:
    post:
      tags: [Reports]
      summary: 모집글 신고
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportCreate" }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/admin/dashboard:
    get:
      tags: [Admin]
      summary: 관리자 핵심 지표와 최근 작업
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/admin/database:
    get:
      tags: [Admin]
      summary: 허용된 비민감 DB 테이블 읽기 전용 조회
      description: 인증 세션, 카카오 식별자, 오픈채팅 URL은 조회 대상에서 제외됩니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - name: table
          in: query
          required: true
          schema:
            type: string
            enum: [users, posts, participations, purchaseRequests, stores, menus, storeMenus, events, inquiries, reviews, favorites, reports, notifications, adminActions]
        - { name: search, in: query, schema: { type: string, maxLength: 100 } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { $ref: "#/components/responses/List" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/admin/reports:
    get:
      tags: [Admin]
      summary: 신고 목록
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/ReportStatus" } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        {
          "200": { $ref: "#/components/responses/List" },
          "403": { $ref: "#/components/responses/Error" }
        }
  /api/v1/admin/reports/{id}:
    get:
      tags: [Admin]
      summary: 신고 상세
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
    patch:
      tags: [Admin]
      summary: 신고 처리
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [status, adminNote]
              properties:
                status: { type: string, enum: [RESOLVED, REJECTED] }
                adminNote: { type: string, minLength: 1, maxLength: 1000 }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: 사용자 목록
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [ACTIVE, SUSPENDED] } }
        - { name: role, in: query, schema: { type: string, enum: [USER, ADMIN] } }
        - { name: keyword, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/admin/users/{id}/suspend:
    patch:
      tags: [Admin]
      summary: 사용자 정지 및 모든 세션 revoke
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/ReasonRequired" }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/users/{id}/unsuspend:
    patch:
      tags: [Admin]
      summary: 사용자 정지 해제
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/ReasonOptional" }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/posts:
    get:
      tags: [Admin]
      summary: 관리자 게시글 목록
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { name: deleted, in: query, schema: { type: boolean } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses: { "200": { $ref: "#/components/responses/List" } }
  /api/v1/admin/posts/{id}:
    delete:
      tags: [Admin]
      summary: 관리자 게시글 soft delete
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/ReasonRequired" }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/posts/{id}/restore:
    patch:
      tags: [Admin]
      summary: 관리자 게시글 복구
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/ReasonOptional" }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/stores:
    post:
      tags: [Admin]
      summary: 매장 생성
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody: { $ref: "#/components/requestBodies/StoreCreate" }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/stores/{id}:
    patch:
      tags: [Admin]
      summary: 매장 수정
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/StoreUpdate" }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/stores/{id}/menus:
    get:
      tags: [Admin]
      summary: 매장별 공식 메뉴 판매 상태 조회
      description: 별도 상태가 없는 공식 메뉴는 기본값 AVAILABLE로 반환합니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { name: category, in: query, schema: { $ref: "#/components/schemas/MenuCategory" } }
        - { name: keyword, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { $ref: "#/components/responses/List" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/admin/stores/{storeId}/menus/{menuId}:
    patch:
      tags: [Admin]
      summary: 매장별 메뉴 판매 여부 변경
      description: AVAILABLE로 되돌리면 별도 재고 설정을 삭제하고 기본 판매 상태를 적용합니다.
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters:
        - { name: storeId, in: path, required: true, schema: { type: string } }
        - { name: menuId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [availability]
              properties:
                availability: { type: string, enum: [AVAILABLE, UNAVAILABLE] }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/admin/events:
    post:
      tags: [Admin]
      summary: 이벤트 생성
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      requestBody: { $ref: "#/components/requestBodies/EventCreate" }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /api/v1/admin/events/{id}:
    patch:
      tags: [Admin]
      summary: 이벤트 수정
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/EventUpdate" }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    delete:
      tags: [Admin]
      summary: 이벤트 삭제
      security: [{ bearerAuth: [] }, { accessCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses: { "204": { description: 삭제 완료 } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    accessCookie: { type: apiKey, in: cookie, name: wm_access_token }
    refreshCookie: { type: apiKey, in: cookie, name: wm_refresh_token }
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string } }
    PostId: { name: postId, in: path, required: true, schema: { type: string } }
    Page: { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
    Limit:
      { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
  schemas:
    PostStatus: { type: string, enum: [OPEN, CLOSED] }
    ReportReason: { type: string, enum: [FRAUD, NO_SHOW, ABUSE, OTHER] }
    ReportStatus: { type: string, enum: [PENDING, RESOLVED, REJECTED] }
    MenuCategory: { type: string, enum: [DRINK, FOOD, PRODUCT] }
    Menu:
      type: object
      required: [id, name, category, variant, imageUrl, eventGroup, eventOrder]
      properties:
        id: { type: string }
        name: { type: string }
        englishName: { type: [string, "null"] }
        category: { $ref: "#/components/schemas/MenuCategory" }
        variant: { type: string, enum: [NONE, HOT, ICE] }
        imageUrl: { type: [string, "null"], format: uri }
        eventGroup: { type: string, enum: [MISSION, GENERAL] }
        eventOrder: { type: integer, minimum: 1, maximum: 10 }
    MenuList:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          required: [items, pagination]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Menu" }
            pagination: { $ref: "#/components/schemas/Pagination" }
    Pagination:
      type: object
      required: [page, limit, total, totalPages, hasNext]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        hasNext: { type: boolean }
    Success:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: {}
    List:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          required: [items, pagination]
          properties:
            items: { type: array, items: {} }
            pagination: { $ref: "#/components/schemas/Pagination" }
    Error:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
            requestId: { type: string }
    PostInput:
      type: object
      additionalProperties: false
      properties:
        storeId: { type: string }
        eventId: { type: [string, "null"] }
        discount: { type: integer, minimum: 1, maximum: 100 }
        totalCount: { type: integer, minimum: 1, maximum: 100 }
        remainCount: { type: integer, minimum: 0, maximum: 100 }
        meetingTime: { type: string, format: date-time }
        availableUntil: { type: string, format: date-time }
        meetingPlace: { type: string, minLength: 1, maxLength: 300 }
        openChatUrl: { type: string, format: uri, pattern: '^https://open\\.kakao\\.com/' }
        description: { type: [string, "null"], maxLength: 2000 }
        imageUrl: { type: [string, "null"], format: uri }
        imageData:
          type: string
          maxLength: 430000
          pattern: "^data:image/(jpeg|png|webp);base64,"
          description: 브라우저에서 압축한 대표 사진 data URL. imageUrl과 동시에 지정할 수 없습니다.
    ReviewCreate:
      type: object
      additionalProperties: false
      required: [postId, rating, content]
      properties:
        postId: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        content: { type: string, minLength: 10, maxLength: 500 }
    ParticipationCreate:
      type: object
      additionalProperties: false
      required: [quantity, pickupStoreId, menuId]
      properties:
        quantity: { type: integer, minimum: 1, maximum: 30 }
        pickupStoreId:
          type: string
          description: 공식 매장 목록에서 선택한 픽업 매장 ID
        menuId:
          type: string
          description: 해당 매장에서 선택 가능한 이벤트 메뉴 ID
    PurchaseRequestCreate:
      type: object
      additionalProperties: false
      required: [storeId, menuId, quantity, desiredTime, openChatUrl]
      properties:
        storeId: { type: string }
        menuId: { type: string }
        quantity: { type: integer, minimum: 1, maximum: 30 }
        desiredTime: { type: string, minLength: 1, maxLength: 100 }
        note: { type: [string, "null"], maxLength: 500 }
        openChatUrl: { type: string, format: uri, pattern: '^https://open\\.kakao\\.com/' }
    PurchaseRequestUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      description: 매장 또는 메뉴를 바꿀 때는 storeId와 menuId를 함께 전달해야 합니다.
      properties:
        storeId: { type: string }
        menuId: { type: string }
        quantity: { type: integer, minimum: 1, maximum: 30 }
        desiredTime: { type: string, minLength: 1, maxLength: 100 }
        note: { type: [string, "null"], maxLength: 500 }
        openChatUrl: { type: string, format: uri, pattern: '^https://open\\.kakao\\.com/' }
    InquiryCreate:
      type: object
      additionalProperties: false
      required: [category, content]
      properties:
        category: { type: string, enum: [SERVICE, ACCOUNT, MODERATION, PAYMENT, OTHER] }
        content: { type: string, minLength: 10, maxLength: 500 }
    ReportCreate:
      type: object
      additionalProperties: false
      required: [targetPostId, reason]
      properties:
        targetPostId: { type: string }
        reason: { $ref: "#/components/schemas/ReportReason" }
        detail: { type: string, minLength: 1, maxLength: 1000 }
    StoreInput:
      type: object
      additionalProperties: false
      properties:
        brand: { type: string, minLength: 1, maxLength: 100 }
        name: { type: string, minLength: 1, maxLength: 100 }
        region: { type: string, minLength: 1, maxLength: 100 }
        district: { type: [string, "null"], minLength: 1, maxLength: 100 }
        address: { type: string, minLength: 1, maxLength: 300 }
        phone: { type: [string, "null"], minLength: 1, maxLength: 30 }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        isActive: { type: boolean }
    EventInput:
      type: object
      additionalProperties: false
      properties:
        title: { type: string, minLength: 1, maxLength: 150 }
        description: { type: string, maxLength: 2000 }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        bannerImage: { type: string, format: uri }
        isActive: { type: boolean }
  responses:
    Success:
      description: 성공
      content: { application/json: { schema: { $ref: "#/components/schemas/Success" } } }
    List:
      description: 페이지 목록
      content: { application/json: { schema: { $ref: "#/components/schemas/List" } } }
    MenuList:
      description: 매장에서 주문 가능한 메뉴 목록
      content: { application/json: { schema: { $ref: "#/components/schemas/MenuList" } } }
    Error:
      description: 오류
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  requestBodies:
    PostCreate:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - { $ref: "#/components/schemas/PostInput" }
              - {
                  required:
                    [
                      storeId,
                      discount,
                      totalCount,
                      remainCount,
                      meetingTime,
                      meetingPlace,
                      openChatUrl
                    ]
                }
    PostUpdate:
      required: true
      content: { application/json: { schema: { $ref: "#/components/schemas/PostInput" } } }
    ReasonRequired:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [reason]
            properties: { reason: { type: string, minLength: 1, maxLength: 1000 } }
    ReasonOptional:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties: { reason: { type: string, maxLength: 1000 } }
    StoreCreate:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - { $ref: "#/components/schemas/StoreInput" }
              - { required: [name, region, address] }
    StoreUpdate:
      required: true
      content: { application/json: { schema: { $ref: "#/components/schemas/StoreInput" } } }
    EventCreate:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - { $ref: "#/components/schemas/EventInput" }
              - { required: [title, startDate, endDate] }
    EventUpdate:
      required: true
      content: { application/json: { schema: { $ref: "#/components/schemas/EventInput" } } }
