# Certbot 최초 발급 전에 사용하는 Cloudflare Tunnel origin 설정입니다.
server {
    listen 127.0.0.1:3000;
    server_name wishmatch.madcamp-kaist.org;

    root /var/www/wishmatch;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_intercept_errors on;
        error_page 502 504 = @api_unavailable;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location @api_unavailable {
        default_type application/json;
        return 503 '{"success":false,"error":{"code":"API_UNAVAILABLE","message":"백엔드 서버 설정을 확인해주세요."}}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
