# Cloudflare Tunnel origin (managed tunnel -> http://127.0.0.1:3000)
server {
    listen 127.0.0.1:3000;
    server_name wishmatch.madcamp-kaist.org;

    root /var/www/wishmatch;
    index index.html;
    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_intercept_errors on;
        error_page 502 504 = @api_unavailable;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_read_timeout 60s;
    }

    location @api_unavailable {
        default_type application/json;
        return 503 '{"success":false,"error":{"code":"API_UNAVAILABLE","message":"백엔드 서버 설정을 확인해주세요."}}';
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name wishmatch.madcamp-kaist.org;
    root /var/www/wishmatch;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wishmatch.madcamp-kaist.org;

    ssl_certificate /etc/letsencrypt/live/wishmatch.madcamp-kaist.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wishmatch.madcamp-kaist.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:WISHMATCH_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /var/www/wishmatch;
    index index.html;
    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_intercept_errors on;
        error_page 502 504 = @api_tls_unavailable;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_read_timeout 60s;
    }

    location @api_tls_unavailable {
        default_type application/json;
        return 503 '{"success":false,"error":{"code":"API_UNAVAILABLE","message":"백엔드 서버 설정을 확인해주세요."}}';
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
